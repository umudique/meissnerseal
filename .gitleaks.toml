# Gitleaks configuration for Arcanum
#
# test-vectors/ contains deliberately computed cryptographic outputs (hex-encoded
# keys, salts, ciphertexts) derived from non-real test inputs. These are test
# fixtures, not secrets — they must be committed to enable cross-language
# verification. Excluding this path is intentional and reviewed.

[allowlist]
paths = [
  "test-vectors/",
]
