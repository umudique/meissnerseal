name: CodeQL

# Runs on pushes to main and on a weekly schedule.
# CodeQL is slow (full compilation + analysis) — not in ci-fast.
on:
  push:
    branches: [main]
  # schedule:
  #   - cron: "0 3 * * 1"  # every Monday 03:00 UTC — disabled temporarily
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: CodeQL Analysis (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: codeql

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: rust
          # Use extended security queries in addition to default
          queries: security-extended

      - name: Build workspace for analysis
        run: cargo build --workspace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:rust
