name: CodeQL

# Runs on a schedule and on pushes to main.
# CodeQL is slow (full compilation + analysis) — not in ci-fast.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # 03:00 UTC every Monday
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: CodeQL Analysis (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: codeql

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: rust
          # Use extended security queries in addition to default
          queries: security-extended

      - name: Build workspace for analysis
        run: cargo build --workspace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: /language:rust
