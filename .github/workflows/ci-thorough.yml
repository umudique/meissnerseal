name: CI Thorough

# Runs on:
#   - Pull requests targeting main (gate before merge)
#   - Nightly schedule (catch regressions early)
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ─── Miri: Undefined behavior detection ────────────────────────────────────
  # Runs only on cryptographic crates where UB is a security failure.
  # Uses nightly toolchain — does not affect production stable builds.
  miri:
    name: Miri (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - arcanum-crypto
          - arcanum-pqc
          - arcanum-security
          - arcanum-ffi
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: miri-${{ matrix.crate }}
      - name: miri test — ${{ matrix.crate }}
        env:
          # arcanum-crypto tests read JSON test-vector files from disk; disable
          # Miri's filesystem isolation for that crate only. All other crates
          # run with full isolation (no flag override needed).
          MIRIFLAGS: >-
            -Zmiri-strict-provenance
            -Zmiri-symbolic-alignment-check
            ${{ matrix.crate == 'arcanum-crypto' && '-Zmiri-disable-isolation' || '' }}
        run: cargo +nightly miri test -p ${{ matrix.crate }}

  # ─── Fuzz: Build and smoke run ─────────────────────────────────────────────
  # Builds all fuzz targets and runs a short smoke fuzz (30s each).
  # A crash in a smoke run is a release blocker.
  fuzz-smoke:
    name: Fuzz Smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - vault_header
          - encrypted_item
          - transfer_envelope
          - sync_envelope
          - device_pairing
          - native_message
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: fuzz-${{ matrix.target }}
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz
      - name: Build fuzz target
        run: cargo +nightly fuzz build ${{ matrix.target }}
      - name: Smoke run — 30 seconds
        run: >
          cargo +nightly fuzz run ${{ matrix.target }}
          -- -max_total_time=30
          -rss_limit_mb=512
      - name: Upload crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 90

  # ─── AddressSanitizer ──────────────────────────────────────────────────────
  # Memory error detection on cryptographic crates.
  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: asan
      - name: Test with AddressSanitizer
        env:
          RUSTFLAGS: "-Z sanitizer=address"
          RUSTDOCFLAGS: "-Z sanitizer=address"
        run: >
          cargo +nightly test
          -p arcanum-crypto
          -p arcanum-security
          --target x86_64-unknown-linux-gnu
          -Z build-std

  # ─── Kani: Bounded model checking ─────────────────────────────────────────
  # Proves bounded correctness properties of cryptographic types.
  # MVP-0: validates harness compilation and type-level proofs.
  # Beta+: full arithmetic and bounds proofs added as functions are implemented.
  kani:
    name: Kani
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
      - name: Kani — arcanum-crypto type proofs
        run: cargo kani --package arcanum-crypto

  # ─── SLSA Provenance Attestation ──────────────────────────────────────────
  # Generates signed build provenance for SLSA Level 2.
  # Records: source commit, builder identity, artifact digest.
  # Verifiable with: gh attestation verify <artifact>
  # Active on PRs targeting main and manual triggers only (not nightly schedule,
  # which does not produce release artifacts).
  provenance:
    name: SLSA Provenance
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && github.event.repository.visibility == 'public'
    permissions:
      id-token: write      # required for OIDC token (provenance signing)
      contents: read
      attestations: write  # required to upload the attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: provenance
      - name: Install cargo-auditable
        run: cargo install cargo-auditable --locked
      - name: Build workspace (release, auditable)
        run: cargo auditable build --workspace --release
      - name: Collect artifacts
        run: |
          mkdir -p provenance-artifacts
          find target/release -maxdepth 1 -type f -executable \
            -not -name '*.d' \
            -exec cp {} provenance-artifacts/ \;
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: provenance-artifacts/*

  # ─── SBOM generation ──────────────────────────────────────────────────────
  # Produces a CycloneDX SBOM listing all dependencies and their versions.
  # Beta release gate per security_assurance.md §6.
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: sbom
      - name: Build workspace
        run: cargo build --workspace
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: sbom-cyclonedx
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          artifact-name: sbom-spdx

  # ─── Code coverage ─────────────────────────────────────────────────────────
  # LLVM-based line and branch coverage for the workspace.
  # Identifies untested paths in cryptographic and security-critical code.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: coverage
      - uses: taiki-e/install-action@81ee9698f20724138a785d788c7567d40f14cd2d # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report
        run: >
          cargo llvm-cov
          --workspace
          --lcov
          --output-path lcov.info
      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

  # ─── Cargo vet ─────────────────────────────────────────────────────────────
  # Dependency trust chain review.
  # Will warn until vet audits are configured.
  vet:
    name: Vet
    runs-on: ubuntu-latest
    continue-on-error: true   # informational until vet config is bootstrapped
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: cargo vet
        run: cargo vet 2>&1 | tee vet-report.txt || true
      - name: Upload vet report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vet-report
          path: vet-report.txt
          retention-days: 30
