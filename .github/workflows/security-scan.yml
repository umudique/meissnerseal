name: Security Scan

# Secret scanning and semantic analysis.
# Runs on push and PRs targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── Secret scanning ───────────────────────────────────────────────────────
  # Detects secrets, tokens, and high-entropy strings in staged and committed code.
  # A secrets vault must not leak secrets into its own repository.
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # full history required for git log scanning
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Semantic analysis ─────────────────────────────────────────────────────
  # Pattern-based security analysis for Rust.
  # Catches misuse patterns clippy cannot express.
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Semgrep — Rust security rules
        run: >
          semgrep
          --config r/rust.lang.security
          --config r/rust.lang.correctness
          --metrics=off
          --error
          --quiet
          .
