name: CI Fast

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ─── Format ────────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ─── Compile ───────────────────────────────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-targets

  # ─── Lint ──────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy — warnings are errors
        run: >
          cargo clippy
          --workspace --all-targets --all-features
          -- -D warnings

  # ─── Tests (nextest) ───────────────────────────────────────────────────────
  # cargo-nextest: parallel execution, per-test timeouts, better output.
  # Doctests are not supported by nextest — run separately below.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-nextest
      - name: cargo nextest run
        run: cargo nextest run --workspace
      - name: cargo test --doc
        run: cargo test --doc --workspace

  # ─── CVE scan ──────────────────────────────────────────────────────────────
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  # ─── License + policy ──────────────────────────────────────────────────────
  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check
        run: cargo deny check

  # ─── Unsafe inventory ──────────────────────────────────────────────────────
  geiger:
    name: Geiger
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: cargo geiger report
        run: cargo geiger --workspace 2>&1 | tee geiger-report.txt
      - name: Upload geiger report
        uses: actions/upload-artifact@v7
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 30

  # ─── Unused dependencies ───────────────────────────────────────────────────
  # Unused deps expand supply chain attack surface — remove them.
  machete:
    name: Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: cargo machete
        run: cargo machete

  # ─── Shell script linting ──────────────────────────────────────────────────
  # Security-relevant scripts must be correct — a hook bug can silently
  # skip security checks.
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck — setup-dev.sh
        run: shellcheck scripts/setup-dev.sh
      - name: shellcheck — pre-commit hook
        run: shellcheck .githooks/pre-commit

  # ─── YAML linting ──────────────────────────────────────────────────────────
  # Malformed CI workflows silently degrade security gates.
  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint --quiet
      - name: yamllint — CI workflows
        run: yamllint -c .yamllint.yml .github/workflows/
      - name: yamllint — dependabot
        run: yamllint -c .yamllint.yml .github/dependabot.yml
