name: CI Fast

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ─── Format ────────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ─── Compile ───────────────────────────────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo check
        run: cargo check --workspace --all-targets

  # ─── Lint ──────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo clippy — warnings are errors
        run: >
          cargo clippy
          --workspace --all-targets --all-features
          -- -D warnings

  # ─── Tests (nextest) ───────────────────────────────────────────────────────
  # cargo-nextest: parallel execution, per-test timeouts, better output.
  # Doctests are not supported by nextest — run separately below.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@afb2de6edb1b0a5f949448d79d123cafdc057f99 # cargo-nextest
        with:
          tool: cargo-nextest
      - name: cargo nextest run
        run: cargo nextest run --workspace
      - name: cargo test --doc
        run: cargo test --doc --workspace

  # ─── Test vectors ────────────────────────────────────────────────────────────
  # Generator drift or dependency degradation must fail closed.
  vectors:
    name: Test vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.12'
      - name: Install test-vector dependencies
        run: pip install -r test-vectors/requirements.txt
      - name: Regenerate and compare test vectors
        run: |
          python3 test-vectors/cross_verify.py | tee /tmp/cv.out
          grep -qE "missing dependency|skipped|✗" /tmp/cv.out \
            && { echo "generator degraded"; exit 1; }
          git diff --exit-code test-vectors/

  # ─── CVE scan ──────────────────────────────────────────────────────────────
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  # ─── License + policy ──────────────────────────────────────────────────────
  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check
        run: cargo deny check

  # ─── Unsafe inventory ──────────────────────────────────────────────────────
  geiger:
    name: Geiger
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: cargo geiger report
        run: cargo geiger --workspace 2>&1 | tee geiger-report.txt
      - name: Upload geiger report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 30

  # ─── Unused dependencies ───────────────────────────────────────────────────
  # Unused deps expand supply chain attack surface — remove them.
  machete:
    name: Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: cargo machete
        run: cargo machete

  # ─── Shell script linting ──────────────────────────────────────────────────
  # Security-relevant scripts must be correct — a hook bug can silently
  # skip security checks.
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: shellcheck — setup-dev.sh
        run: shellcheck scripts/setup-dev.sh
      - name: shellcheck — pre-commit hook
        run: shellcheck .githooks/pre-commit

  # ─── YAML linting ──────────────────────────────────────────────────────────
  # Malformed CI workflows silently degrade security gates.
  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: pip install yamllint --quiet
      - name: yamllint — CI workflows
        run: yamllint -c .yamllint.yml .github/workflows/
      - name: yamllint — dependabot
        run: yamllint -c .yamllint.yml .github/dependabot.yml
