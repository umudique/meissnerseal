[graph]
# Only check dependencies used in the final build
targets = []
all-features = false
no-default-features = false

# ─── Licenses ────────────────────────────────────────────────────────────────
# Version 2 schema: licenses not in the allow list are denied by default.
# Separate deny/copyleft/default fields removed in cargo-deny v0.14+ (PR #611).
[licenses]
version = 2

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
confidence-threshold = 0.8

# libfuzzer-sys uses NCSA (Illinois Open Source License ≈ BSD-3-Clause)
exceptions = [
    { allow = ["NCSA"], name = "libfuzzer-sys" },
]

# ─── Advisories ──────────────────────────────────────────────────────────────
# Version 2 schema: vulnerability/notice fields removed (PR #611).
# unmaintained/unsound now take scope values: all/workspace/transitive/none.
# Vulnerabilities are always fatal when present — no configuration needed.
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]

# Check all crates (workspace + transitive) for unmaintained and unsound
unmaintained = "all"
unsound = "all"

# Yanked versions: deny — pulls in known-broken releases
yanked = "deny"

ignore = []

# ─── Bans ────────────────────────────────────────────────────────────────────
[bans]
# Deny multiple versions of the same crate — forces resolution.
# Known transitive conflicts are listed in skip[] below.
multiple-versions = "deny"

# Deny wildcard dependencies
wildcards = "deny"

# Deny specific crates
deny = [
    # Avoid C FFI for crypto — keep pure Rust
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },

    # Avoid deprecated or known-problematic crates
    { name = "rustc-serialize" },
    { name = "tempdir" },         # replaced by tempfile
]

# Skip duplicate version check for these (accepted transitive conflicts).
# Each entry is a known ecosystem split; no direct control over resolution.
skip = [
    # getrandom 0.2 (rand 0.8 ecosystem) vs 0.4 (newer crates)
    { name = "getrandom", version = "0.2" },
    # windows-sys 0.59 (older ecosystem) vs 0.61 (newer crates)
    { name = "windows-sys", version = "0.59" },
    # wit-bindgen 0.51 (older toolchain) vs 0.57 (newer toolchain)
    { name = "wit-bindgen", version = "0.51" },
    # ml-kem 0.3.2 uses the new RustCrypto trait generation (digest 0.11,
    # rand_core 0.10, crypto-common 0.2); existing crates (argon2, chacha20poly1305,
    # aes-gcm, hkdf, sha2) use the prior generation. No resolution possible
    # without upgrading the entire crypto stack. Skip the old versions.
    { name = "block-buffer",   version = "0.10" },
    { name = "cpufeatures",    version = "0.2"  },
    { name = "crypto-common",  version = "0.1"  },
    { name = "digest",         version = "0.10" },
    { name = "rand_core",      version = "0.6"  },
]
skip-tree = []

# ─── Sources ─────────────────────────────────────────────────────────────────
[sources]
# Only allow crates.io as a source
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
