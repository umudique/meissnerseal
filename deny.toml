[graph]
# Only check dependencies used in the final build
targets = []
all-features = false
no-default-features = false

# ─── Licenses ────────────────────────────────────────────────────────────────
[licenses]
version = 2

# Explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]

# Deny copyleft licenses — downstream and enterprise compatibility
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
    "BUSL-1.1",
]

# libfuzzer-sys uses NCSA (Illinois Open Source License ≈ BSD-3-Clause)
exceptions = [
    { allow = ["NCSA"], name = "libfuzzer-sys" },
]

copyleft = "warn"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

# ─── Advisories ──────────────────────────────────────────────────────────────
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]

# Active CVEs are always a build failure
vulnerability = "deny"

# Unmaintained dependencies: warn — not always actionable immediately
unmaintained = "warn"

# Unsound (UB-causing) crates: always deny
unsound = "deny"

# Yanked versions: deny
yanked = "deny"

notice = "warn"
ignore = []

# ─── Bans ────────────────────────────────────────────────────────────────────
[bans]
# Deny multiple versions of the same crate — forces resolution
multiple-versions = "warn"

# Deny wildcard dependencies
wildcards = "deny"

# Deny specific crates
deny = [
    # Avoid C FFI for crypto — keep pure Rust
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },

    # Avoid deprecated or known-problematic crates
    { name = "rustc-serialize" },
    { name = "tempdir" },         # replaced by tempfile
]

# Skip duplicate version check for these (common transitive conflicts)
skip = []
skip-tree = []

# ─── Sources ─────────────────────────────────────────────────────────────────
[sources]
# Only allow crates.io as a source
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
