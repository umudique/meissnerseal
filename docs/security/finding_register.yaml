  - id: F-12
    kind: security_review
    source: "Milestone re-review GATE-CORE-REV (Security agent) — meissnerseal-core"
    date: 2026-06-08
    description: "persist_vault TOCTOU: exists()-check then std::fs::rename can clobber a vault created in the window (rename overwrites on Unix); error-path cleanup remove_file(path) can delete a concurrently-created target it does not own — violates 'never overwrite' (G-01/G-06)"
    cwe: CWE-367
    severity: high
    blocking: true
    status: resolved
    remediation: "Atomically claim the final path up-front (OpenOptions create_new on the target, replacing the racy exists() check); only remove the target on error if this call exclusively created it (never blind remove_file(path)). Keep crash-safe temp+fsync+rename+fsync-parent; portable across Linux/macOS/Windows (no renameat2 RENAME_NOREPLACE dependency). REOPENED ADDENDUM (GATE-CORE-REV2): temp cleanup must be ownership-aware too — never remove a temp file this call did not exclusively create; make tmp removal symmetric with the target_claimed gate, or make the temp path per-call unique so cross-writer collision is structurally impossible."
    verification: "CORE-6 (commit 7653d32) closed the TARGET-overwrite half: persist_vault claims the final path up-front via OpenOptions::create_new(true) — this O_EXCL claim is the sole no-overwrite gate (racy exists() checks removed). target_claimed flag gates target cleanup, so a pre-existing/foreign vault is never deleted; drop-before-rename keeps Windows rename-replace safe. PARTIAL — see reopen below."
    commit: "7653d32"
    reopened:
      date: 2026-06-09
      by: "GATE-CORE-REV2 (focused Security re-review) — needs_revision"
      residual: "crates/meissnerseal-core/src/vault/engine.rs:236-241 | CWE-367 | the error-path remove_file(&tmp_path) is UNCONDITIONAL, not gated by ownership like the target removal. With two concurrent create() calls on the same final path, the loser fails the create_new(true) target claim (AlreadyExists) and then deletes the WINNER's in-flight deterministic sibling temp (path.with_extension(\"arcv.tmp\")); the winner's subsequent rename then fails with ENOENT. Violates the documented 'remove only files this call exclusively created' invariant (persist_vault doc-comment §Postconditions) and denies successful persistence to the winning writer. The target half of F-12 is closed; the temp-cleanup half is not. Remediation tracked as CORE-7; re-verify at GATE-CORE-REV3."
    residual_resolution: "CORE-7 (Phase-1 RED baseline 9dedac4 + Phase-2 fix 19bfd65), approach B (per-call-unique temp). persist_vault now derives the temp path via unique_tmp_path(path, record_id) = path.with_extension('{hex(record_id)}.msv.tmp') — a same-parent sibling whose uniqueness comes from the existing CSPRNG record_id (no new RNG). The single tmp_path variable drives the temp create_new write, the rename, AND the error-path remove_file, so cleanup can only ever name THIS call's own temp; a losing concurrent writer (which never created its unique temp) cannot delete the winner's in-flight temp. create_new(target) claim, target_claimed-gated target cleanup, and crash-safe ordering all unchanged. record_id in the filename leaks nothing (it is cleartext non-secret metadata already on disk in the record table/frame). GATE-CORE-REV3 (orchestrator-verified, HUMAN-authorized 2026-06-09): re-read the committed code, confirmed cross-deletion structurally impossible, crash-safe order intact, no plaintext in filename/logs; the regression is pinned by test concurrent_loser_does_not_delete_winner_temp which exercised the real cleanup path, was genuinely RED before (31 passed/1 failed) and is GREEN after (32 passed/0 failed). Residual disk-hygiene only (orphan unique temps) tracked as F-15 (deferred)."
    residual_commit: "19bfd65"

  - id: F-13
    kind: consistency
    source: "Milestone re-review GATE-CORE-REV (Consistency + Security agents) — meissnerseal-core"
    date: 2026-06-08
    description: "Record-table entry revision_id[16] (spec vault_format_v1.md §5) is not modeled: RecordTableEntry omits it, serialize_record_table writes zero bytes, parse_record_table skips it. WRK auth binds the FRAME revision_id (so F-01 not reopened), but the on-disk §5 byte-model deviates from spec — unauthenticated/unused table field"
    cwe: CWE-345
    severity: low
    blocking: false
    status: resolved
    remediation: "DECISION 2026-06-08 (HUMAN): option (a) — implement the full §5 byte-model. Add revision_id to RecordTableEntry; serialize/parse it consistently with the frame's revision_id (same value for the WRK record); keep the 46-byte entry layout. Regenerate the affected test vectors (cross_verify.py) so the TV-4 drift guard stays green. Rejected (b) drop-from-spec: chosen to keep the table sync-ready (index-level revision is a sync/transfer affordance). See F-14 for the latent table-authentication requirement this creates."
    verification: "CORE-6 (commit 44b5303): RecordTableEntry carries revision_id at the §5 position; serialize_record_table writes it and parse_record_table reads it (no more zero placeholder); persist_vault sets the WRK entry's table revision_id = frame revision_id. 46-byte entry layout preserved; cross_verify.py clean with git diff --exit-code test-vectors/ showing no drift (the vectors already encoded real §5 revision bytes). Table value stays advisory per F-14; frame AAD remains authoritative."
    commit: "44b5303"

  - id: F-14
    kind: design
    source: "Derived from F-13 decision (a), GATE-CORE-REV re-review — meissnerseal-core"
    date: 2026-06-08
    description: "The record table is cleartext (I-03) and unauthenticated; once F-13(a) stores a real revision_id in the table, there are two revision sources — the frame's (AEAD-authenticated, authoritative) and the table's (cleartext, unauthenticated). Harmless in MVP-0 (no consumer trusts the table revision), but a tampered table revision becomes an integrity gap the moment a consumer (sync/transfer reconciliation) relies on it"
    cwe: CWE-345
    severity: low
    blocking: false
    status: resolved
    remediation: "ADR-029 (MEK-sealed record table): record table encrypted + authenticated under dedicated MEK (AES-256-GCM, table-auth HKDF subkey). SCHEMA_ARCANUM_RECORDS_V2 defined in spec (commit 5897843) and implemented in CORE-8 (commit 05fc067). Two-revision-source ambiguity collapses — consumers may trust the MEK-verified table. ADR-029 §Decision states 'This resolves F-14'."
    verification: "vault_format_v1.md §5 normative MEK-sealed table definition; ADR-029 §Decision 'resolves F-14'; CORE-8 (05fc067) + CORE-9 item ops (62b754c) operate on MEK-sealed table; cargo test green."
    commit: "05fc067"

