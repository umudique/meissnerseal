  - id: F-36
    kind: security_review
    component: meissnerseal-cli
    source: "Internal review — crates/meissnerseal-cli/src/main.rs (2026-06-25)"
    date: 2026-06-25
    description: >-
      string_to_zeroized_vec() closes F-27's literal requirement (original String
      is zeroized) but returns a raw Vec<u8> without ZeroizeOnDrop. Secret bytes
      remain in an unprotected heap buffer until the caller drops the Vec. All
      internal functions (unlock_session, add_item, get_item, export_bundle,
      import_bundle, list_vault) accepted Vec<u8> password/passphrase parameters,
      extending the unprotected window through the full call chain to SecretBytes.
      Fix narrows the window: from prompt to the SecretBytes boundary, bytes travel
      inside Zeroizing<Vec<u8>> which zeroes on drop; std::mem::take moves bytes
      into SecretBytes with zero copy at the handoff point.
    cwe: "CWE-226"
    severity: medium
    blocking: false
    status: resolved
    remediation: >-
      Change string_to_zeroized_vec() return type to Zeroizing<Vec<u8>>.
      Change all internal function signatures accepting password/passphrase
      from Vec<u8> to Zeroizing<Vec<u8>>. Use std::mem::take(&mut *password)
      at SecretBytes::new() call sites for zero-copy ownership transfer.
    verification: >-
      cargo fmt, check, clippy, test, audit: all pass. Full call chain
      (unlock_session, add_item, get_item, list_vault, export_bundle,
      import_bundle) now propagates Zeroizing<Vec<u8>>. std::mem::take
      ensures zero-copy handoff into SecretBytes at every call site.
    commit: "65a8c80"

      Added MalformedSignature variant to SigningError. verify() now returns
      MalformedSignature when signature bytes cannot be parsed to [u8; 64],
      and VerificationFailed only when the well-formed signature does not
      verify cryptographically. CONTRACT.md API surface and verify() doc
      block updated.
    verification: "cargo test -p meissnerseal-pqc: 17/17 pass (2026-06-25)"
    commit: ""

  - id: F-40
    kind: design
    component: meissnerseal-pqc
    source: "PQC-3 external review — new() constructors accept invalid state"
    date: 2026-06-25
    description: >-
      SigningPublicKey::new, SigningPrivateKey::new, Signature::new accept any
      byte length for any algorithm, allowing invalid state to be constructed
      silently. Errors surface later in sign()/verify() via InvalidKey rather
      than at construction time. Violates "make invalid state unrepresentable."
    cwe: "CWE-20"
    severity: medium
    blocking: false
    blocks: "DEVICE-1"
    status: deferred
    remediation: >-
      Deferred to DEVICE-1. Security impact is low — sign()/verify() already
      catch malformed keys via InvalidKey (F-37 fix). Typed constructors
      (try_new_ed25519([u8; 32]), try_new_ed25519_signature([u8; 64])) should
      be added when DEVICE-1 defines real callers; the hybrid slot
      (Ed25519MlDsa87HybridV1) has variable-length keys so API shape should
      be decided once both variants are implemented. See DEVICE-1 notes in
      meissnerseal-ops/tasks.yaml.
    verification: "Pending DEVICE-1 implementation."
    commit: ""

  - id: F-39
    kind: design
    component: meissnerseal-pqc
    source: "PQC-3 external review — domain separation / transcript ownership"
    date: 2026-06-25
    description: >-
      mldsa::sign() accepts raw bytes with no domain separation enforced at
      the primitive level. If the same Ed25519 key is used in multiple protocol
      contexts (DEVICE-1 enrollment, XFER-1 transfer) without caller-side
      domain prefixing, cross-protocol replay and signature confusion attacks
      become possible. Ed25519 provides no built-in context separation.
    cwe: "CWE-347"
    severity: high
    blocking: false
    blocks: "XFER-1, DEVICE-1"
    status: accepted
    remediation: >-
      Domain separation is the caller's responsibility per CONTRACT.md [P-04].
      Added P-04 precondition to CONTRACT.md requiring callers to prepend a
      protocol/role/version context string to all message bytes before signing.
      Updated sign() doc block to reference [P-04] and F-39.
      XFER-1 and DEVICE-1 must each define and enforce their own transcript
      domain strings. Alternative (prefix inside sign()) deferred until XFER-1
      transcript format is finalized to avoid double-prefixing.
    verification: "CONTRACT.md [P-04] added; enforced by XFER-1 and DEVICE-1 implementation."
    commit: ""

  - id: F-38
    kind: coverage_gap
    component: meissnerseal-pqc
    source: "PQC-3 external review — algorithm_id wire encoding not tested"
    date: 2026-06-25
    description: >-
      KAT vectors tested raw Ed25519 sign/verify but did not verify the
      little-endian u16 wire encoding of the algorithm identifier (0x0001 →
      [0x01, 0x00]). ADR-028 "algorithm-tagged" implies the LE byte order is
      load-bearing; downgrade and substitution attacks target exactly this
      boundary. Full encoded_signature wire KAT (algorithm_id_le || sig_bytes)
      is deferred to XFER-1 where serialization is implemented.
    cwe: "CWE-345"
    severity: high
    blocking: false
    status: resolved
    remediation: >-
      Added algorithm_id_u16_le field ("0100") to signing_ed25519_v1.json.
      KAT test now asserts algorithm().to_u16().to_le_bytes() matches the
      anchored vector. Full wire-format KAT (encoded_signature) deferred to
      XFER-1 per scope boundary.
    verification: "cargo test -p meissnerseal-pqc: 17/17 pass (2026-06-25)"
    commit: ""

  - id: F-37
    kind: api_design
    component: meissnerseal-pqc
    source: "PQC-3 external review — SigningPrivateKey API surface"
    date: 2026-06-25
    description: >-
      SigningPrivateKey::as_bytes() was pub, exposing raw private seed bytes
      to any caller with a reference. Contradicts the invariant that secret
      material is never exposed outside the crate. The only internal consumer
      was sign(), a free function in the same module with direct field access
      rights.
    cwe: "CWE-200"
    severity: high
    blocking: false
    status: resolved
    remediation: >-
      Removed pub as_bytes() from SigningPrivateKey entirely. sign() now
      accesses private_key.bytes.as_slice() directly (same-module access).
      Test updated to access bytes field directly. No external caller existed.
    verification: "cargo test -p meissnerseal-pqc: 17/17 pass (2026-06-25)"
    commit: "5293d5a"

