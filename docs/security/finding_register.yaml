    source: "Milestone review (Consistency + Security agents) — meissnerseal-core"
    date: 2026-06-08
    description: "create() does not serialize/persist a vault file (no temp-file/fsync/rename crash-safe write); returns a session after key derivation only"
    cwe: CWE-693
    severity: high
    blocking: true
    status: resolved
    remediation: "Implement crash-safe vault write (serialize -> encrypt -> temp -> fsync -> rename -> fsync parent) OR re-scope CONTRACT to exclude persistence from the Stable surface"
    verification: "CORE-3 (ADR-025 Option A): persist_vault implements §8 sequence (serialize -> embed existing WRK ciphertext/nonce -> .msv.tmp create_new -> sync_all -> atomic rename -> fsync parent -> cleanup tmp+target on any error). v1 serializers added (prefix/header/KDF-TLV/record-table/frame), byte-inverse of parse_* (roundtrip tests). create->unlock roundtrip green; missing-parent failure leaves no .msv/.tmp (G-06). 40 core tests green, clippy -D warnings clean. AAD placeholders kept consistent both sides — real record_id/revision_id binding is F-01/F-02 (CORE-4)."
    commit: "7f11558"

