  - id: F-15
    kind: design
    source: "Derived from F-12 residual remediation (CORE-7, B = per-call-unique temp) — meissnerseal-core"
    date: 2026-06-09
    description: "CORE-7 closes F-12's temp-cleanup race by making the persist temp path per-call unique (structural isolation): cleanup can only ever remove this call's own temp, regardless of control flow. The accepted trade-off is that crash-orphaned temp files (vault.<unique>.msv.tmp) are no longer identifiable as stale from their name alone, so they are not auto-reclaimed and may accumulate as disk litter after a crash mid-write."
    cwe: CWE-459
    severity: low
    blocking: false
    status: deferred
    remediation: "Add an orphan-temp sweep at a QUIESCENT point (vault unlock, when no write is in flight): remove sibling vault.*.msv.tmp files. The single-writer-per-mount architecture makes this sound only at a quiescent point — never inside a persist error path mid-flight (that would reintroduce the F-12 foreign-delete shape). Until implemented, orphaned temps are harmless scratch litter (no plaintext: the temp holds only the already-encrypted vault image); disk hygiene only, no integrity/availability impact on user data."
    verification: ""
    commit: ""

